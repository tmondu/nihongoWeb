name: Community Contribution Auto-Review

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-community-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      !startsWith(github.event.pull_request.head.ref, 'automation/') &&
      (
        contains(github.event.pull_request.title, 'theme') ||
        contains(github.event.pull_request.title, 'fact') ||
        contains(github.event.pull_request.title, 'Theme') ||
        contains(github.event.pull_request.title, 'Fact') ||
        contains(github.event.pull_request.title, 'proverb') ||
        contains(github.event.pull_request.title, 'Proverb') ||
        contains(github.event.pull_request.title, 'haiku') ||
        contains(github.event.pull_request.title, 'Haiku') ||
        contains(github.event.pull_request.title, 'trivia') ||
        contains(github.event.pull_request.title, 'Trivia') ||
        contains(github.event.pull_request.title, 'grammar') ||
        contains(github.event.pull_request.title, 'Grammar') ||
        contains(github.event.pull_request.title, 'anime quote') ||
        contains(github.event.pull_request.title, 'Anime Quote') ||
        contains(github.event.pull_request.title, 'anime-quote') ||
        contains(github.event.pull_request.title, 'Anime-Quote') ||
        contains(github.event.pull_request.title, 'idiom') ||
        contains(github.event.pull_request.title, 'Idiom') ||
        contains(github.event.pull_request.title, 'regional dialect') ||
        contains(github.event.pull_request.title, 'Regional Dialect') ||
        contains(github.event.pull_request.title, 'regional-dialect') ||
        contains(github.event.pull_request.title, 'Regional-Dialect') ||
        contains(github.event.pull_request.title, 'false friend') ||
        contains(github.event.pull_request.title, 'False Friend') ||
        contains(github.event.pull_request.title, 'cultural etiquette') ||
        contains(github.event.pull_request.title, 'Cultural Etiquette') ||
        contains(github.event.pull_request.title, 'example sentence') ||
        contains(github.event.pull_request.title, 'Example Sentence') ||
        contains(github.event.pull_request.title, 'common mistake') ||
        contains(github.event.pull_request.title, 'Common Mistake') ||
        contains(github.event.pull_request.title, 'video game quote') ||
        contains(github.event.pull_request.title, 'Video Game Quote') ||
        contains(github.event.pull_request.title, 'videogame quote') ||
        contains(github.event.pull_request.title, 'Videogame Quote') ||
        contains(github.event.pull_request.title, 'wallpaper url') ||
        contains(github.event.pull_request.title, 'Wallpaper URL') ||
        contains(github.event.pull_request.title, 'community note line') ||
        contains(github.event.pull_request.title, 'Community Note Line')
      )

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-head
          fetch-depth: 1
          persist-credentials: false

      - name: Validate and process contribution
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMATION_PR_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const templates = require('./.github/templates/messages.cjs');
            const t = templates.communityReview;

            const prTitle = context.payload.pull_request.title;
            const prTitleLower = prTitle.toLowerCase();
            const prBody = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;

            const errors = [];
            const warnings = [];
            let foundIssue = null;
            let linkedIssue = null;

            async function listAllPrFiles() {
              let files = [];
              let page = 1;
              while (true) {
                const { data: pageItems } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                  page,
                });
                files = files.concat(pageItems);
                if (!pageItems || pageItems.length < 100) {
                  break;
                }
                page += 1;
              }
              return files;
            }

            function classifyTitle(titleLower) {
              if (titleLower.includes('wallpaper url')) {
                return 'wallpaper url';
              }
              if (titleLower.includes('community note line')) {
                return 'community note';
              }
              if (titleLower.includes('anime quote') || titleLower.includes('anime-quote') || titleLower.includes('animequote')) {
                return 'anime quote';
              }
              if (titleLower.includes('video game quote') || titleLower.includes('videogame quote') || titleLower.includes('video-game-quote')) {
                return 'video game quote';
              }
              if (titleLower.includes('regional dialect') || titleLower.includes('regional-dialect') || titleLower.includes('regionaldialect')) {
                return 'regional dialect';
              }
              if (titleLower.includes('false friend') || titleLower.includes('false-friend')) {
                return 'false friend';
              }
              if (titleLower.includes('cultural etiquette') || titleLower.includes('cultural-etiquette')) {
                return 'cultural etiquette';
              }
              if (titleLower.includes('example sentence') || titleLower.includes('example-sentence')) {
                return 'example sentence';
              }
              if (titleLower.includes('common mistake') || titleLower.includes('common-mistake')) {
                return 'common mistake';
              }
              if (titleLower.includes('theme')) {
                return 'theme';
              }
              if (titleLower.includes('fact') && !titleLower.includes('proverb')) {
                return 'fact';
              }
              if (titleLower.includes('proverb')) {
                return 'proverb';
              }
              if (titleLower.includes('haiku')) {
                return 'haiku';
              }
              if (titleLower.includes('trivia')) {
                return 'trivia';
              }
              if (titleLower.includes('grammar')) {
                return 'grammar';
              }
              if (titleLower.includes('idiom')) {
                return 'idiom';
              }
              return 'community content';
            }

            async function searchOpenCommunityIssues(query) {
              const q = `${query} repo:${context.repo.owner}/${context.repo.repo} is:issue is:open label:${templates.labels.community}`;
              const res = await github.rest.search.issuesAndPullRequests({
                q,
                per_page: 10,
              });
              return res.data.items || [];
            }

            async function findMatchingIssue(validationType) {
              const issueMatch = prBody.match(/[Cc]loses?\s*#(\d+)|[Ff]ixes?\s*#(\d+)|[Rr]esolves?\s*#(\d+)/);
              if (issueMatch) {
                linkedIssue = parseInt(issueMatch[1] || issueMatch[2] || issueMatch[3], 10);
                return linkedIssue;
              }

              if (validationType === 'theme') {
                let themeName = null;
                const patterns = [
                  /add\s+(.+?)\s+theme/i,
                  /theme[:\s]+(.+)/i,
                  /feat\(theme\)[:\s]+add\s+(.+)/i,
                ];
                for (const pattern of patterns) {
                  const match = prTitle.match(pattern);
                  if (match) {
                    themeName = match[1].trim().replace(/theme$/i, '').trim();
                    break;
                  }
                }
                if (themeName) {
                  const matches = await searchOpenCommunityIssues(`"Add Theme:" "${themeName}"`);
                  if (matches.length > 0) {
                    return matches[0].number;
                  }
                  const oldMatches = await searchOpenCommunityIssues(`"Add New Color Theme:" "${themeName}"`);
                  if (oldMatches.length > 0) {
                    return oldMatches[0].number;
                  }
                }
                return null;
              }

              const idMatch = prTitle.match(/#(\d+)/);
              const id = idMatch ? idMatch[1] : null;
              if (!id) {
                return null;
              }

              const queriesByType = {
                fact: [`"Add Japan Fact #${id}"`, `"Add new Japan Fact #${id}"`],
                proverb: [`"Add Japanese Proverb #${id}"`, `"Add new Japanese Proverb #${id}"`],
                haiku: [`"Add Japanese Haiku #${id}"`, `"Add Classic Japanese Haiku #${id}"`, `"Add new Japanese Haiku #${id}"`],
                trivia: [`"Add Trivia Question #${id}"`, `"Add New Trivia Question #${id}"`, `"Add new Trivia Question #${id}"`],
                grammar: [`"Add Grammar Point #${id}"`, `"Add New Grammar Point #${id}"`, `"Add new Grammar Point #${id}"`],
                'anime quote': [`"Add Anime Quote #${id}"`, `"Add Famous Anime Quote #${id}"`, `"Add new Anime Quote #${id}"`],
                idiom: [`"Add Japanese Idiom #${id}"`, `"Add New Japanese Idiom #${id}"`, `"Add new Japanese Idiom #${id}"`],
                'regional dialect': [`"Add Dialect Entry #${id}"`, `"Add Regional Dialect Entry #${id}"`, `"Add new Dialect Entry #${id}"`],
                'false friend': [`"Add False Friend Pair #${id}"`, `"Add Japanese False Friend #${id}"`, `"Add new False Friend Pair #${id}"`],
                'cultural etiquette': [`"Add Etiquette Tip #${id}"`, `"Add Japanese Cultural Etiquette Tip #${id}"`, `"Add new Etiquette Tip #${id}"`],
                'example sentence': [`"Add Example Sentence #${id}"`, `"Add Japanese Example Sentence #${id}"`, `"Add new Example Sentence #${id}"`],
                'common mistake': [`"Add Learner Mistake #${id}"`, `"Add Common Japanese Learner Mistake #${id}"`, `"Add new Learner Mistake #${id}"`],
                'video game quote': [`"Add Video Game Quote #${id}"`, `"Add Famous Japanese Video Game Quote #${id}"`, `"Add new Video Game Quote #${id}"`],
                'wallpaper url': [`"Add Wallpaper URL #${id}"`, `"Add new Wallpaper URL #${id}"`],
                'community note': [`"Add Community Note Line #${id}"`, `"Add new Community Note Line #${id}"`],
              };

              const queries = queriesByType[validationType] || [];
              for (const query of queries) {
                const matches = await searchOpenCommunityIssues(query);
                if (matches.length > 0) {
                  return matches[0].number;
                }
              }
              return null;
            }

            let prFiles = [];
            try {
              prFiles = await listAllPrFiles();
            } catch (e) {
              errors.push(`Could not list PR files: ${e.message}`);
            }

            const ignoredFiles = ['package-lock.json'];
            const reviewedFiles = prFiles.filter(function(file) {
              return !ignoredFiles.includes(file.filename);
            });
            const changedPaths = reviewedFiles.map(function(file) { return file.filename; });
            const docsPaths = changedPaths.filter(function(file) {
              return file.startsWith('docs/community-notes/');
            });
            const contentPaths = changedPaths.filter(function(file) {
              return file.startsWith('community/content/');
            });

            if (changedPaths.length === 0) {
              console.log('No relevant files changed');
              return;
            }

            const isCommunityNoteContribution = docsPaths.length > 0;
            const isWallpaperContribution = changedPaths.includes('community/content/community-wallpaper-urls.json') || prTitleLower.includes('wallpaper url');

            let validationType = classifyTitle(prTitleLower);
            if (isCommunityNoteContribution) {
              validationType = 'community note';
            } else if (isWallpaperContribution) {
              validationType = 'wallpaper url';
            } else if (contentPaths.length > 0 && validationType === 'community content') {
              validationType = 'community content';
            }

            if (isCommunityNoteContribution) {
              const invalidFiles = changedPaths.filter(function(file) {
                return !file.startsWith('docs/community-notes/');
              });
              if (invalidFiles.length > 0) {
                errors.push('Community note PRs must modify only files in docs/community-notes/');
              }
              if (docsPaths.length !== 1) {
                errors.push('Community note PRs must modify exactly one file in docs/community-notes/');
              }
            } else {
              const invalidFiles = changedPaths.filter(function(file) {
                return !file.startsWith('community/content/');
              });
              if (invalidFiles.length > 0) {
                errors.push('Community content PRs must modify only files in community/content/');
              }
              if (contentPaths.length === 0) {
                errors.push('Community content PRs must modify at least one file in community/content/');
              }
              if (isWallpaperContribution && !changedPaths.every(function(file) { return file === 'community/content/community-wallpaper-urls.json'; })) {
                errors.push('Wallpaper URL PRs must modify only community/content/community-wallpaper-urls.json');
              }
            }

            for (const file of contentPaths.filter(function(file) { return file.endsWith('.json'); })) {
              const filePath = path.join('pr-head', file);
              if (!fs.existsSync(filePath)) {
                errors.push(`${file} was not found in the PR checkout`);
                continue;
              }
              try {
                JSON.parse(fs.readFileSync(filePath, 'utf8'));
              } catch (e) {
                errors.push(`Invalid JSON in ${file}: ${e.message}`);
              }
            }

            try {
              foundIssue = await findMatchingIssue(validationType);
            } catch (e) {
              warnings.push(`Could not search for a matching issue: ${e.message}`);
            }

            const targetIssue = linkedIssue || foundIssue;
            if (!targetIssue) {
              // warnings.push('Could not find a matching community issue for this PR');
            }

            const isValid = errors.length === 0;

            if (foundIssue && !linkedIssue) {
              const autoLinkLine = `🤖 **Auto-linked:** Closes #${foundIssue}`;
              const newBody = prBody.includes(autoLinkLine)
                ? prBody
                : `${prBody}\n\n---\n${autoLinkLine}`.trim();
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: newBody,
              });
              console.log(`Updated PR body to link issue #${foundIssue}`);
            }

            const warningList = warnings.length > 0
              ? `\n\n**Warnings:**\n${warnings.map(function(w) { return '- ⚠️ ' + w; }).join('\n')}`
              : '';

            let commentBody;
            if (isValid) {
              let issueNote = '';
              if (foundIssue && !linkedIssue) {
                issueNote = '\n\n' + t.passed.autoDetectedIssue.replace('{issue}', foundIssue);
              } else if (linkedIssue) {
                issueNote = '\n\n' + t.passed.linkedIssue.replace('{issue}', linkedIssue);
              }

              const checks = t.passed.checks.map(function(c) { return '- ✅ ' + c; }).join('\n');
              commentBody = `${t.passed.title}\n\n${t.passed.body.replace('{type}', validationType)}\n\n**Checks passed:**\n${checks}${issueNote}${warningList}\n\n${t.passed.footer}`;
            } else {
              const errorList = errors.map(function(e) { return '- ❌ ' + e; }).join('\n');
              commentBody = `${t.failed.title}\n\n${t.failed.body.replace('{type}', validationType)}\n\n${errorList}${warningList}\n\n${t.failed.footer}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody,
            });

            if (!isValid) {
              return;
            }

            console.log(`Auto-merge disabled for PR #${prNumber}; leaving review output only.`);
